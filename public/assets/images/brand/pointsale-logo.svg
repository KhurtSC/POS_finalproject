  <text x="198" y="116" fill="#fbbf24" font-family="Figtree, Arial, sans-serif" font-size="19" font-weight="800">Coffee Shop Checkout</text>
  <path d="M200 137h196" stroke="#14b8a6" stroke-width="7" stroke-linecap="round"/>
