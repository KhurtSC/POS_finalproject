<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" role="img" aria-labelledby="title desc">
  <title id="title">Cafe POS logo</title>
  <desc id="desc">A clean cafe point of sale logo with a coffee cup, receipt, and subtle checkout mark.</desc>
  <defs>
