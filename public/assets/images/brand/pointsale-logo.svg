      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="cup" x1="53" y1="40" x2="155" y2="142" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="520" height="180" rx="34" fill="url(#bg)"/>
  <g transform="translate(32 24)">
