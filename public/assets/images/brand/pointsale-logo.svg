    <path d="M39 47c5-12 18-12 23 0 5 11 18 11 23 0" fill="none" stroke="#0f172a" stroke-width="7" stroke-linecap="round"/>
    <path d="M40 124h55" stroke="#0f172a" stroke-width="9" stroke-linecap="round"/>
